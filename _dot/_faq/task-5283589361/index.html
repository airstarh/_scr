<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск товаров</title>
</head>
<body>
    <div class="filters">
        <input type="text" id="search" placeholder="Поиск по названию">
        <input type="number" id="priceFrom" placeholder="Цена от">
        <input type="number" id="priceTo" placeholder="Цена до">
        <select id="category">
            <option value="">Все категории</option>
            <option value="1">Электроника</option>
            <option value="2">Одежда</option>
            <option value="3">Книги</option>
            <option value="4">Спорт</option>
        </select>
        <label><input type="checkbox" id="inStock"> В наличии</label>
        <input type="number" id="ratingFrom" placeholder="Рейтинг от (0-5)" min="0" max="5" step="0.1">
        <select id="sort">
            <option value="newest">Новые</option>
            <option value="price_asc">Цена по возрастанию</option>
            <option value="price_desc">Цена по убыванию</option>
            <option value="rating_desc">Рейтинг по убыванию</option>
        </select>
    </div>

    <button onclick="loadProducts()">Найти</button>

    <div id="products"></div>
    <div id="pagination"></div>

    <script src="app.js"></script>
</body>
</html>
