<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Chat Window</title>
    <style>
      /* ===== RESET & BASE ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: #f0f2f5;
      }

      /* ===== CHAT CONTAINER ===== */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 800px;
        margin: 0 auto;
        background: white;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }

      /* ===== HEADER ===== */
      .chat-header {
        flex: 0 0 auto;
        padding: 16px 20px;
        background: #075e54;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #054740;
      }

      .chat-header h2 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }

      .chat-header .status {
        font-size: 12px;
        opacity: 0.8;
        margin-left: auto;
      }

      /* ===== MESSAGES AREA ===== */
      .messages {
        flex: 1 1 auto;
        min-height: 0; /* CRITICAL: allows scrolling */
        padding: 16px 20px;
        overflow-y: auto;
        background: #ece5dd;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* Message bubbles */
      .message {
        max-width: 70%;
        padding: 8px 12px;
        border-radius: 8px;
        word-wrap: break-word;
        animation: fadeIn 0.3s ease;
      }

      .message.received {
        align-self: flex-start;
        background: white;
        color: #303030;
        border-bottom-left-radius: 2px;
      }

      .message.sent {
        align-self: flex-end;
        background: #dcf8c6;
        color: #303030;
        border-bottom-right-radius: 2px;
      }

      .message .time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 4px;
        text-align: right;
      }

      /* System messages */
      .message.system {
        align-self: center;
        background: rgba(0, 0, 0, 0.05);
        color: #666;
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 12px;
        max-width: 90%;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Scrollbar styling */
      .messages::-webkit-scrollbar {
        width: 6px;
      }

      .messages::-webkit-scrollbar-track {
        background: transparent;
      }

      .messages::-webkit-scrollbar-thumb {
        background: #c1c7cd;
        border-radius: 3px;
      }

      .messages::-webkit-scrollbar-thumb:hover {
        background: #a0a7ae;
      }

      /* ===== INPUT AREA ===== */
      .input-area {
        flex: 0 0 auto;
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        background: #f0f0f0;
        border-top: 1px solid #ddd;
        align-items: flex-end;
      }

      .input-area textarea {
        flex: 1 1 auto;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-family: inherit;
        font-size: 14px;
        resize: none;
        min-height: 44px;
        max-height: 120px;
        line-height: 1.5;
        background: white;
        transition: border-color 0.2s;
      }

      .input-area textarea:focus {
        outline: none;
        border-color: #075e54;
        box-shadow: 0 0 0 3px rgba(7, 94, 84, 0.1);
      }

      .input-area textarea::placeholder {
        color: #999;
      }

      .input-area button {
        flex: 0 0 auto;
        padding: 10px 24px;
        background: #075e54;
        color: white;
        border: none;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        height: 44px;
        min-width: 80px;
      }

      .input-area button:hover {
        background: #054740;
      }

      .input-area button:active {
        transform: scale(0.96);
      }

      .input-area button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 600px) {
        .chat-container {
          height: 100dvh;
          max-width: 100%;
          box-shadow: none;
        }

        .messages {
          padding: 12px 14px;
        }

        .message {
          max-width: 85%;
          font-size: 14px;
        }

        .input-area {
          padding: 8px 12px;
          gap: 6px;
        }

        .input-area textarea {
          font-size: 16px; /* Prevents iOS zoom */
          padding: 8px 12px;
          min-height: 40px;
        }

        .input-area button {
          padding: 8px 16px;
          height: 40px;
          min-width: 60px;
          font-size: 13px;
        }

        .chat-header h2 {
          font-size: 16px;
        }
      }

      @media (max-width: 400px) {
        .message {
          max-width: 92%;
          font-size: 13px;
          padding: 6px 10px;
        }

        .input-area textarea {
          font-size: 14px;
          padding: 6px 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== CHAT LAYOUT ===== -->
    <div class="chat-container">
      <!-- Header -->
      <div class="chat-header">
        <h2>💬 Chat</h2>
        <span class="status">● Online</span>
      </div>

      <!-- Messages -->
      <div
        class="messages"
        id="messages"
      >
        <!-- Messages will be added here dynamically -->
        <div class="message received">
          Hello! How can I help you?
          <div class="time">10:30 AM</div>
        </div>
        <div class="message sent">
          I need help with my account.
          <div class="time">10:31 AM</div>
        </div>
        <div class="message received">
          Sure! What seems to be the issue?
          <div class="time">10:32 AM</div>
        </div>
        <div class="message system">User joined the chat</div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <textarea
          id="input"
          rows="1"
          placeholder="Type a message..."
          autocomplete="off"
        ></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const messagesDiv = document.getElementById("messages");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");

        // Auto-resize textarea
        input.addEventListener("input", () => {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 120) + "px";
        });

        // Send message function
        function sendMessage() {
          const text = input.value.trim();
          if (!text) return;

          // Add message to chat
          addMessage(text, "sent");

          // Clear input
          input.value = "";
          input.style.height = "auto";
          input.focus();

          // Simulate response (remove this in production)
          setTimeout(() => {
            addMessage("Thanks for your message!", "received");
          }, 1000);
        }

        // Add message to chat
        function addMessage(text, type = "received") {
          const div = document.createElement("div");
          div.className = `message ${type}`;

          const now = new Date();
          const timeStr = now.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });

          div.innerHTML = `
                    ${text}
                    <div class="time">${timeStr}</div>
                `;

          messagesDiv.appendChild(div);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Event listeners
        sendBtn.addEventListener("click", sendMessage);

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });

        // Focus input on load
        input.focus();

        // Example: Add system message
        addMessage("Chat started", "system");
      });
    </script>
  </body>
</html>
